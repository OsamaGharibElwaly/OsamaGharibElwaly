<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

  <style>
    .title { font: bold 22px monospace; fill: #FFD700; }
    .node { font: 14px monospace; fill: #ffffff; }
    .label { font: bold 16px monospace; fill: #81D4FA; }
    .line { stroke: #555; stroke-width: 2; }
    .box { fill: #111827; stroke: #374151; stroke-width: 1.5; rx: 10; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f19"/>

  <!-- Title -->
  <text x="350" y="50" class="title">🌳 Software Leading AI — Tech Tree</text>

  <!-- Root -->
  <rect x="420" y="80" width="160" height="40" class="box"/>
  <text x="450" y="105" class="label">CORE</text>

  <!-- Lines from root -->
  <line x1="500" y1="120" x2="200" y2="170" class="line"/>
  <line x1="500" y1="120" x2="500" y2="170" class="line"/>
  <line x1="500" y1="120" x2="800" y2="170" class="line"/>

  <!-- Level 1 nodes -->
  <rect x="120" y="170" width="160" height="40" class="box"/>
  <text x="140" y="195" class="label">Languages</text>

  <rect x="420" y="170" width="160" height="40" class="box"/>
  <text x="460" y="195" class="label">AI / LLM</text>

  <rect x="720" y="170" width="160" height="40" class="box"/>
  <text x="760" y="195" class="label">Backend</text>

  <!-- Level 2 lines -->
  <line x1="200" y1="210" x2="200" y2="270" class="line"/>
  <line x1="500" y1="210" x2="500" y2="270" class="line"/>
  <line x1="800" y1="210" x2="800" y2="270" class="line"/>

  <!-- Level 2 nodes -->
  <text x="110" y="300" class="node">Python • JS • TS • SQL</text>

  <text x="410" y="300" class="node">RAG • OpenAI • HuggingFace</text>

  <text x="710" y="300" class="node">FastAPI • Node • REST APIs</text>

  <!-- Second layer -->
  <line x1="500" y1="210" x2="200" y2="370" class="line"/>
  <line x1="500" y1="210" x2="500" y2="370" class="line"/>
  <line x1="500" y1="210" x2="800" y2="370" class="line"/>

  <rect x="120" y="370" width="160" height="40" class="box"/>
  <text x="160" y="395" class="label">Frontend</text>

  <rect x="420" y="370" width="160" height="40" class="box"/>
  <text x="450" y="395" class="label">Databases</text>

  <rect x="720" y="370" width="160" height="40" class="box"/>
  <text x="760" y="395" class="label">DevOps</text>

  <text x="110" y="430" class="node">React • Next.js • TS</text>
  <text x="410" y="430" class="node">PostgreSQL • MongoDB</text>
  <text x="710" y="430" class="node">Docker • AWS • CI/CD</text>

  <!-- Final layer -->
  <line x1="500" y1="410" x2="500" y2="500" class="line"/>

  <rect x="360" y="500" width="280" height="60" class="box"/>
  <text x="390" y="535" class="label">Engineering Layer</text>

  <text x="290" y="600" class="node">
    Testing • Evaluation • Reliability • System Design
  </text>

</svg>