<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Transparent background (default) */

  .ring {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    animation: pulse 2.5s ease-in-out infinite;
  }

  .blue {
    stroke: #1e90ff;
  }

  .green {
    stroke: #00c853;
  }

  .core {
    fill: url(#grad);
    animation: glow 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { opacity: 0.4; transform: scale(0.98); }
    50%  { opacity: 1; transform: scale(1.03); }
    100% { opacity: 0.4; transform: scale(0.98); }
  }

  @keyframes glow {
    0%   { filter: drop-shadow(0 0 3px #1e90ff); }
    50%  { filter: drop-shadow(0 0 10px #00c853); }
    100% { filter: drop-shadow(0 0 3px #1e90ff); }
  }
  </style>
  <!-- GRADIENT -->
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e90ff"/>
        <stop offset="100%" stop-color="#00c853"/>
      </linearGradient>
    </defs>
    <!-- OUTER RINGS -->
      <circle cx="100" cy="100" r="70" class="ring blue"/>
      <circle cx="100" cy="100" r="50" class="ring green"/>
      <!-- CORE ICON (contact node) -->
        <circle cx="100" cy="100" r="25" class="core"/>
        <!-- SIGNAL DOTS -->
          <circle cx="100" cy="40" r="4" fill="#1e90ff"/>
          <circle cx="160" cy="100" r="4" fill="#00c853"/>
          <circle cx="100" cy="160" r="4" fill="#1e90ff"/>
          <circle cx="40" cy="100" r="4" fill="#00c853"/>
        </svg>